name: CI/CD - Purchase Transaction APIsss

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Dar permissão ao Gradle
        run: chmod +x ./gradlew

      - name: Rodar testes
        run: ./gradlew clean test

  build-and-deploy:
    name: Build, Push e Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Dar permissão ao Gradle
        run: chmod +x ./gradlew

      - name: Build do projeto
        run: ./gradlew clean build

      - name: Login no Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_SERVER }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build da imagem Docker
        run: |
          docker build -t ${{ secrets.REGISTRY_SERVER }}/purchase-api/purchase-api:${{ github.sha }} .

      - name: Push da imagem
        run: |
          docker push ${{ secrets.REGISTRY_SERVER }}/purchase-api/purchase-api:${{ github.sha }}

      - name: Configurar KUBECONFIG
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Atualizar imagem no manifesto
        run: |
          sed -i "s|DOCKER_IMAGE_PLACEHOLDER|${{ secrets.REGISTRY_SERVER }}/purchase-api/purchase-api:${{ github.sha }}|g" k3s/app-purchase-transaction.yml

      - name: Deploy no cluster
        run: |
          kubectl apply -f k3s/app-purchase-transaction.yml
          kubectl rollout status deployment/purchase-transaction-api
